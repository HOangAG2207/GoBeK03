basePath: /
definitions:
  model.Health:
    properties:
      instance_id:
        description: |-
          InstanceID: định danh instance cụ thể của service
          Hữu ích khi chạy nhiều instance (load balancing, Kubernetes, etc.)
        type: string
      message:
        description: 'Message: thông điệp trạng thái (ví dụ: "OK", "Healthy", "Down")'
        type: string
      service_name:
        description: 'ServiceName: tên của service (giúp nhận diện khi có nhiều service)'
        type: string
    type: object
  url.shortenURLRequest:
    properties:
      exp:
        description: thời gian hết hạn (giây)
        example: 604800
        type: integer
      url:
        example: https://www.google.com
        type: string
    required:
    - url
    type: object
  url.shortenURLResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for GoBe K03
  title: GoBe K03 project API
  version: "1.0"
paths:
  /v1/health-check:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Health'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check health
      tags:
      - health
  /v1/links/shorten:
    post:
      consumes:
      - application/json
      description: Generate a shortened URL code from a given URL with optional expiration
        time
      parameters:
      - description: URL to shorten with expiration time (exp in seconds)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/url.shortenURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/url.shortenURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/url.shortenURLResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/url.shortenURLResponse'
      summary: Shorten a URL
      tags:
      - url
swagger: "2.0"
